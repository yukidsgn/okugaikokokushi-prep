<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>資格過去問アプリ</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2c7be5">
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", "Hiragino Sans", sans-serif;
      margin: 0; padding: 0; background: #f4f6f9; color: #222;
    }
    header {
      background: #2c7be5; color: #fff; padding: 14px 16px;
      font-size: 18px; font-weight: bold; position: sticky; top: 0; z-index: 10;
    }
    .container { padding: 16px; max-width: 720px; margin: 0 auto; }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      background: #d7e3f4; color: #2c7be5; font-size: 15px; font-weight: bold;
      cursor: pointer;
    }
    .tab-btn.active { background: #2c7be5; color: #fff; }
    .btn {
      display: inline-block; padding: 12px 16px; border: none; border-radius: 8px;
      background: #2c7be5; color: #fff; font-size: 15px; cursor: pointer; margin: 4px 0;
    }
    .btn.sub { background: #6c757d; }
    .btn.full { display: block; width: 100%; }
    .card {
      background: #fff; border-radius: 10px; padding: 14px; margin-bottom: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .list-item { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .badge {
      background: #ffe3e3; color: #d6336c; border-radius: 12px;
      padding: 2px 10px; font-size: 13px; font-weight: bold; white-space: nowrap;
    }
    .subject-tag {
      display: inline-block; background: #e7f5ff; color: #1971c2;
      border-radius: 6px; padding: 2px 8px; font-size: 12px; margin-bottom: 6px;
    }
    .choice-btn {
      display: block; width: 100%; text-align: left; padding: 14px;
      margin: 8px 0; border: 2px solid #d7e3f4; border-radius: 8px;
      background: #fff; font-size: 16px; cursor: pointer;
    }
    .choice-btn:hover { background: #f1f6fd; }
    .choice-btn.correct { border-color: #2f9e44; background: #ebfbee; }
    .choice-btn.wrong { border-color: #e03131; background: #fff5f5; }
    .result-box { padding: 12px; border-radius: 8px; margin-top: 12px; font-weight: bold; }
    .result-box.ok { background: #ebfbee; color: #2f9e44; }
    .result-box.ng { background: #fff5f5; color: #e03131; }
    .explanation { background: #fff9db; padding: 12px; border-radius: 8px; margin-top: 10px; }
    .progress { font-size: 14px; color: #555; margin-bottom: 10px; }
    .score { font-size: 28px; font-weight: bold; text-align: center; margin: 20px 0; }
    .sort-bar { margin-bottom: 12px; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #888; }
    .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px; }
  </style>
</head>
<body>
  <header>📘 資格過去問アプリ</header>
  <div class="container">

    <div class="tabs">
      <button class="tab-btn active" id="tabListBtn" onclick="showTab('list')">一覧で1問ずつ</button>
      <button class="tab-btn" id="tabTestBtn" onclick="showTab('test')">10問テスト</button>
    </div>

    <div id="loading" class="loading">問題を読み込み中…</div>

    <!-- ① 一覧モード -->
    <div id="listView" style="display:none;">
      <div class="sort-bar">
        <button class="btn sub" id="sortBtn" onclick="toggleSort()">間違いが多い順に並べ替え</button>
      </div>
      <div id="listArea"></div>
    </div>

    <!-- ① 詳細（1問挑戦） -->
    <div id="detailView" style="display:none;"></div>

    <!-- ② 10問テスト：科目選択 -->
    <div id="testSelectView" style="display:none;">
      <div class="card">
        <p>科目を選んでください</p>
        <div id="subjectButtons"></div>
        <button class="btn full" id="startTestBtn" onclick="startTest()" disabled>テストを始める</button>
      </div>
    </div>

    <!-- ② 10問テスト：出題中 -->
    <div id="testQuizView" style="display:none;"></div>

    <!-- ② 10問テスト：結果 -->
    <div id="testResultView" style="display:none;"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
