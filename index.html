<!-- File: index.html -->
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- キャッシュ無効化（ブラウザで古い表示が出るのを防ぐ） -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>屋外広告士合格 App</title>
  <!-- iOS Safari「ホーム画面に追加」時のアプリ名 -->
  <meta name="apple-mobile-web-app-title" content="屋外広告士合格">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#CCB37E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --c-base: #CCB37E;
      --radius: 999px;
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; }
    body {
      font-family: "Noto Sans JP", -apple-system, "Hiragino Sans", sans-serif;
      margin: 0; padding: 0; background: #f6f3ec; color: #3a3a3a;
      display: flex; flex-direction: column; min-height: 100vh;
    }
    header {
      background: var(--c-base); color: #fff; padding: 12px 16px;
      font-size: 18px; font-weight: 700; position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; gap: 10px;
    }
    header img {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; background: #fff;
    }
    .container { padding: 16px; max-width: 720px; margin: 0 auto; width: 100%; flex: 1; }

    /* 更新情報バナー */
    .update-banner {
      background: #fff; border-radius: 16px; padding: 12px 16px; margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06); border-left: 5px solid var(--c-base);
    }
    .update-banner .ttl { font-size: 13px; font-weight: 700; color: #8a7340; margin-bottom: 4px; }
    .update-banner .date { font-size: 12px; color: #999; }
    .update-banner .body { font-size: 14px; line-height: 1.6; margin-top: 4px; }

    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tab-btn {
      flex: 1; padding: 12px; border: none; border-radius: var(--radius);
      background: #ece3d0; color: #8a7340; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: .2s;
    }
    .tab-btn.active { background: var(--c-base); color: #fff; }
    .btn {
      display: inline-block; padding: 12px 20px; border: none; border-radius: var(--radius);
      background: var(--c-base); color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; margin: 4px 0; transition: .2s;
    }
    .btn:hover { opacity: .88; }
    .btn.sub { background: #b7a98a; }
    .btn.full { display: block; width: 100%; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .card {
      background: #fff; border-radius: 18px; padding: 16px; margin-bottom: 12px;
      box-shadow: 0 2px 10px rgba(0,0,0,.06);
    }
    .list-item { cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .list-item .meta { flex: 1; }
    .id-tag { font-size: 12px; color: #999; margin-bottom: 4px; }
    .subject-tag {
      display: inline-block; border-radius: var(--radius); padding: 3px 12px;
      font-size: 12px; font-weight: 700; color: #5a4a2a; margin-bottom: 6px;
    }
    .counts { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
    .badge-wrong {
      background: #ffe3e3; color: #d6336c; border-radius: var(--radius);
      padding: 2px 10px; font-size: 13px; font-weight: 700; white-space: nowrap;
    }
    .badge-correct {
      background: #ebfbee; color: #2f9e44; border-radius: var(--radius);
      padding: 2px 10px; font-size: 13px; font-weight: 700; white-space: nowrap;
    }
    .choice-btn {
      display: block; width: 100%; text-align: left; padding: 14px;
      margin: 8px 0; border: 2px solid #e6ddcb; border-radius: 16px;
      background: #fff; font-size: 16px; cursor: pointer; transition: .15s;
    }
    .choice-btn:hover { background: #faf8f2; }
    .choice-btn.correct { border-color: #2f9e44; background: #ebfbee; }
    .choice-btn.wrong { border-color: #e03131; background: #fff5f5; }

    /* 正解・不正解：色を反転（背景を濃く、文字を白系に） */
    .result-box { padding: 12px; border-radius: 16px; margin-top: 12px; font-weight: 700; text-align: center; font-size: 17px; line-height: 1.6; }
    .result-box.ok { background: #2f9e44; color: #ebfbee; }
    .result-box.ng { background: #e03131; color: #fff5f5; }

    .explanation { background: #fff9db; padding: 12px; border-radius: 16px; margin-top: 10px; line-height: 1.6; }
    .progress { font-size: 14px; color: #777; margin-bottom: 10px; font-weight: 700; }
    .score { font-size: 28px; font-weight: 700; text-align: center; margin: 20px 0 6px; }
    .score-msg { font-size: 18px; text-align: center; color: #8a7340; line-height: 1.8; margin: 4px 8px 18px; font-weight: 700; }
    .loading { text-align: center; padding: 40px; color: #999; line-height: 1.6; }

    .select-title { font-weight: 700; text-align: center; }

    .sort-wrap { margin-bottom: 12px; }
    .sort-toggle {
      width: 100%; padding: 12px; border: none; border-radius: var(--radius);
      background: #b7a98a; color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; line-height: 1.3;
    }
    .sort-menu {
      display: none; margin-top: 8px; background: #fff; border-radius: 16px;
      padding: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .sort-menu.open { display: block; }
    .sort-menu button {
      display: block; width: 100%; text-align: left; padding: 12px 14px;
      border: none; background: none; font-size: 14px; cursor: pointer;
      border-radius: 12px; color: #5a4a2a; font-weight: 500;
    }
    .sort-menu button:hover { background: #f6f3ec; }
    .sort-menu button.active { background: #ece3d0; font-weight: 700; }
    .sort-menu .label { font-size: 12px; color: #999; padding: 8px 14px 4px; }

    .year-head {
      font-size: 16px; font-weight: 700; color: #8a7340;
      margin: 4px 4px 12px; padding-bottom: 6px; border-bottom: 2px solid #e6ddcb;
    }

    .back-bar { margin-top: 16px; }
    .back-btn {
      padding: 12px 24px; border: none; border-radius: var(--radius);
      background: #b7a98a; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
    }

    /* ページネーション（Google検索風） */
    .pager { display: flex; justify-content: center; align-items: center; flex-wrap: wrap; gap: 6px; margin: 18px 0 8px; }
    .pager button {
      min-width: 38px; padding: 8px 14px; border: none; border-radius: 999px;
      background: #ece3d0; color: #8a7340; font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .pager button:hover { background: #e0d4ba; }
    .pager button.active { background: var(--c-base); color: #fff; }
    .pager button:disabled { opacity: .35; cursor: not-allowed; }
    .pager .nav { background: #b7a98a; color: #fff; }

    /* フッター */
    footer {
      text-align: center; padding: 22px 16px 28px; color: #8a7340;
      font-family: "Zen Kaku Gothic New", sans-serif; font-weight: 700;
      font-size: 14px; letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <header>
    <img src="logo.png" alt="ロゴ" onerror="this.style.display='none'">
    屋外広告士合格 App
  </header>
  <div class="container">

    <!-- 更新情報（手入力で書き換えてください） -->
    <div class="update-banner" id="updateBanner">
      <div class="ttl">📢 更新情報</div>
      <div class="date">2026年6月14日 更新</div>
      <div class="body">2025年度の問題を追加しました。並び替え・ページ送り機能も使えます！</div>
    </div>

    <div class="tabs" id="tabs">
      <button class="tab-btn active" id="tabListBtn" onclick="showTab('list')">☁ 過去問題一覧 ☁</button>
      <button class="tab-btn" id="tabTestBtn" onclick="showTab('test')" style="white-space:nowrap;">🌸10問テストに挑戦🌸</button>
    </div>

    <div id="loading" class="loading">問題を読み込み中…</div>

    <div id="listView" style="display:none;">
      <div class="sort-wrap">
        <button class="sort-toggle" id="sortToggle" onclick="toggleSortMenu()">並び替え ▼</button>
        <div class="sort-menu" id="sortMenu"></div>
      </div>
      <div id="listArea"></div>
      <div id="pager" class="pager"></div>
    </div>

    <div id="detailView" style="display:none;"></div>

    <div id="testSelectView" style="display:none;">
      <div class="card">
        <p class="select-title">科目を選んでね♪</p>
        <div id="subjectButtons"></div>
        <button class="btn full" id="startTestBtn" onclick="startTest()" disabled>テストを始める！</button>
      </div>
    </div>

    <div id="testQuizView" style="display:none;"></div>
    <div id="testResultView" style="display:none;"></div>

  </div>

  <footer>Built by yukidsgn (おゆき)</footer>

  <!-- ?v= の数字を更新のたびに変えると、古いキャッシュを確実に回避できます -->
  <script src="app.js?v=20260614b"></script>
</body>
</html>
